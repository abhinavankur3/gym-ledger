services:
  gym-ledger:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/gym-ledger.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@gym.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
    volumes:
      - gym-data:/app/data
    restart: unless-stopped

volumes:
  gym-data:
